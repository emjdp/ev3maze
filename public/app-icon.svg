    <rect x="267" y="285" width="117" height="92" rx="20" fill="#252c36" stroke="#f6a623" stroke-width="14"/>
    <circle cx="267" cy="331" r="16" fill="#9aa5b5" stroke="#edf2f7" stroke-width="5"/>
    <circle cx="384" cy="331" r="16" fill="#9aa5b5" stroke="#edf2f7" stroke-width="5"/>
    <path d="M325 285v-46" stroke="#00a39c" stroke-width="15" stroke-linecap="round"/>
    <circle cx="325" cy="235" r="12" fill="#00a39c"/>
