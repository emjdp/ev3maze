<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">EV3 Maze app icon</title>
  <desc id="desc">EV3 robot tracing a maze route.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#15191f"/>
      <stop offset="1" stop-color="#0f1115"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="54" y="54" width="404" height="404" rx="58" fill="#1b2028" stroke="#374150" stroke-width="6"/>
  <path d="M112 382V276h156V130h136" fill="none" stroke="#f5f4ee" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M112 382V276h156" fill="none" stroke="#f6a623" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="112" cy="382" r="44" fill="#2563eb" stroke="#edf2f7" stroke-width="8"/>
  <circle cx="404" cy="130" r="44" fill="#64b63f" stroke="#edf2f7" stroke-width="8"/>
